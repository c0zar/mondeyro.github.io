<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONDEYRO | Welcome</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
        }

        .video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        
        header {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px); 
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2); 
        }

        .enter-btn {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 15px 40px;
            font-size: 16px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.3s;
        }

        .enter-btn:hover {
            background: #fff;
            color: #000;
        }

        .sorry-text {
            position: absolute;
            bottom: 30px;
            color: #fff;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="menu">
                <a href="index.html" style="color: white;">Main</a>
                <a href="main.html" style="color: white;">Catalog</a>
                <a href="login.html" style="color: white;">Account</a>
                <a href="contact.html" style="color: white;">Contact</a>
            </div>
            <h1 class="logo" style="color: white;">MONDEYRO</h1>
            <div class="cart">
                <a href="panier.html" style="color: white;">Cart <span id="cart-count">0</span></a>
            </div>
        </nav>
    </header>

    <video autoplay muted loop playsinline class="video-background">
        <source src="huinyadlasayta.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <a href="index.html" class="enter-btn">ENTER CATALOG</a>
        <p class="sorry-text">SORRY, LOVE IS NOT FOR ME</p>
    </div>

    <script>
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('mondeyro_cart')) || [];
            document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.quantite, 0);
        }
        window.onload = updateCartCount;
    </script>
</body>
</html>
